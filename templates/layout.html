<!DOCTYPE html>
<html lang="en" data-theme="light" data-color="blue">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DataPulse — UPI Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js" defer></script>
</head>
<body>

  <!-- ── Navbar ── -->
  <nav class="dp-nav">
    <div class="brand">
      <svg width="22" height="22" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
      DataPulse <small>UPI Dashboard</small>
    </div>
    <div class="nav-actions">
      <span class="nav-icon-btn" onclick="openUploadModal()" role="button" title="Upload Report">
        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
      </span>
      <div class="settings-wrap">
        <span class="nav-icon-btn" onclick="toggleSettings(event)" role="button" title="Settings">
          <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><circle cx="12" cy="12" r="3"/></svg>
        </span>
        <div class="settings-panel" id="settingsPanel">
          <span class="settings-label">Appearance</span>
          <div class="theme-row">
            <span style="font-size:13px;font-weight:600">Dark Mode</span>
            <input type="checkbox" role="switch" id="darkToggle" onchange="toggleDarkMode(this.checked)">
          </div>
          <span class="settings-label">Accent Color</span>
          <div class="color-swatches">
            <span class="color-swatch active" data-c="blue" onclick="setColor('blue')" title="Blue"></span>
            <span class="color-swatch" data-c="red" onclick="setColor('red')" title="Red"></span>
            <span class="color-swatch" data-c="orange" onclick="setColor('orange')" title="Orange"></span>
            <span class="color-swatch" data-c="green" onclick="setColor('green')" title="Green"></span>
            <span class="color-swatch" data-c="purple" onclick="setColor('purple')" title="Purple"></span>
          </div>
        </div>
      </div>
      <span class="nav-icon-btn" id="refreshBtn" onclick="refreshData()" role="button" title="Refresh Data">
        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
      </span>
    </div>
  </nav>

  <!-- ── Main ── -->
  <div class="dp-main">
    {{template "dashboard.html" .}}
  </div>

  <!-- ── Widget Editor Modal ── -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h3 id="modalTitle">Edit Widget</h3>
        <span class="modal-close" onclick="closeModal()" role="button">&times;</span>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer" id="modalFooter"></div>
    </div>
  </div>

  <!-- ── Toast ── -->
  <div class="toast" id="toast"></div>

  <script src="/static/app.js"></script>
  <script>initApp({{.AvailableDates}});</script>
</body>
</html>
